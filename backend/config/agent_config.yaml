agents:
  PlannerAgent:
    prompt_file: "prompts/planner.md"
    model: "gemini"
    mcp_servers: []
    description: "Generates the execution plan graph."

  BrowserAgent:
    prompt_file: "prompts/browser.md"
    model: "gemini"
    mcp_servers: ["browser"]
    description: "Browses the web using text search or vision."

  CoderAgent:
    prompt_file: "prompts/coder.md"
    model: "gemini"
    mcp_servers: ["sandbox", "browser", "rag_civic", "yahoo_finance"]
    description: "Writes Python code to analyze data or solve problems."

  RetrieverAgent:
    prompt_file: "prompts/retriever.md"
    model: "gemini"
    mcp_servers: ["rag_civic", "browser", "yahoo_finance"]
    description: "Searches local documents and web."

  SummarizerAgent:
    prompt_file: "prompts/summarizer.md"
    model: "gemini"
    mcp_servers: ["browser", "rag_civic"]
    description: "Synthesizes final answers."

  DistillerAgent:
    prompt_file: "prompts/distiller.md"
    model: "gemini"
    mcp_servers: []
    description: "Distills complex content into structured summaries."

  ThinkerAgent:
    prompt_file: "prompts/thinker.md"
    model: "gemini"
    mcp_servers: []
    description: "Reasoning and logical inference engine."

  FormatterAgent:
    prompt_file: "prompts/formatter.md"
    model: "gemini"
    mcp_servers: []
    description: "Formats final reports to high standards."

  ClarificationAgent:
    prompt_file: "prompts/clarification.md"
    model: "gemini"
    mcp_servers: []
    description: "Interacts with user for clarifications."

  QAAgent:
    prompt_file: "prompts/qa.md"
    model: "gemini"
    mcp_servers: []
    description: "Quality assurance and validation."

  TestAgent:
    prompt_file: "prompts/test_agent.md"
    model: "ollama"
    mcp_servers: []
    description: "Generates Pytest tests for Python code."

  DebuggerAgent:
    prompt_file: "prompts/debugger_agent.md"
    model: "ollama"
    mcp_servers: []
    description: "Fixes code based on test failures."

  LibrarianAgent:
    prompt_file: "prompts/librarian.md"
    model: "gemini"
    mcp_servers: ["rag_civic"]
    description: "Analyzes and tags documents for Civic Lens."

  CurriculumDesignerAgent:
    prompt_file: "prompts/curriculum_designer.md"
    model: "gemini"
    mcp_servers: []
    description: "Designs lessons and 25-question quizzes for the Civic Lens curriculum."

  InitialExaminerAgent:
    prompt_file: "prompts/initial_examiner.md"
    model: "gemini"
    mcp_servers: []
    description: "Placement quiz agent — samples 1 question from alternating levels to assess user proficiency."

  GuideAgent:
    prompt_file: "prompts/guide_agent.md"
    model: "gemini"
    mcp_servers: []
    description: "Delivers lessons conversationally to guide the user through each civics level."

  ExaminerAgent:
    prompt_file: "prompts/examiner_agent.md"
    model: "gemini"
    mcp_servers: []
    description: "Administers 7-question level quizzes (pass threshold 6/7) and generates feedback."

  AdminAgent:
    prompt_file: "prompts/admin_agent.md"
    model: "gemini"
    mcp_servers: []
    description: "Natural language admin assistant. Interprets requests and dispatches to admin tools."
    tools:
      - list_lessons
      - get_lesson
      - update_lesson
      - list_data_files
      - add_data_file
      - delete_data_file
      - generate_embeddings

  opposition:
    prompt_file: "prompts/opposition.md"
    model: "gemini"
    mcp_servers: []
    description: "Evaluates proposed bills and debates the user playing the role of the parliament opposition."

